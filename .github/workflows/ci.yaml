name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  integration-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run inference benchmark test
        run: uv run pytest -m integration -k test_inference_benchark --no-header -v
        env:
          OPENEO_AUTH_METHOD: client_credentials
          OPENEO_AUTH_PROVIDER_ID: CDSE
          OPENEO_AUTH_CLIENT_ID: ${{ secrets.OPENEO_WAC_AUTH_CLIENT_ID }}
          OPENEO_AUTH_CLIENT_SECRET: ${{ secrets.OPENEO_WAC_AUTH_CLIENT_SECRET }}
